name: Release

on:
  release:
    types: [published]

jobs:
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: deno publish --dry-run
      - run: deno publish

  npm:
    runs-on: ubuntu-latest

    permissions:
        id-token: write
        contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          
      - name: Upgrade npm for the latest
        run: npm install -g npm@latest

      - name: Build npm package
        run: deno task build

      - name: Publish to npm
        working-directory: dist
        run: npm publish --provenance --access public
