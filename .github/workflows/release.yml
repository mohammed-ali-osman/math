name: Release

on:
  push:
    tags:
      - "v*.*.*"

      
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Test
        run: deno test

      # Safety check (important)
      - name: Dry run publish
        run: deno publish --dry-run

      # Actual publish (JSR via OIDC)
      - name: Publish
        run: deno publish